# =============================================================
# db-site.yml — 부트스트랩 및 메인·복제본 DB 전체 배포 마스터 플레이북
# 파일위치 : ~/project/infra/ansible/db-site.yml
# =============================================================
---

# -----------------------------------------------------------
# [사전 준비] terraform apply 직후 EC2 인스턴스의 SSH/Tailscale
# 연결이 완전히 준비될 때까지 컨트롤 노드(localhost)에서 대기
# SSH 연결 시도 없이 TCP 포트만 체크하므로 타임아웃 없음
# -----------------------------------------------------------
- name: "Pre-flight: AWS EC2 SSH 포트 대기 (localhost에서 체크)"
  hosts: bastion, lb-postgres-main
  gather_facts: false
  tasks:
    - name: "SSH 포트(22) 오픈 대기 — 로컬에서 TCP 체크 (최대 10분)"
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        state: started
        timeout: 600     # 최대 10분
        delay: 5         # 첫 시도 전 5초 대기
        sleep: 5         # 재시도 간격
      delegate_to: localhost  # ← 컨트롤 노드(testvm2)에서 실행, SSH 불필요
      become: false

- name: "0단계: 모든 원격 서버 초기 계정 셋팅 (Bootstrap)"
  import_playbook: bootstrap.yml

- name: "1단계: PostgreSQL 메인 DB 배포, 기동 및 S3 백업 설정"
  import_playbook: lb-postgres-main.yml

- name: "2단계: PostgreSQL 복제본(Replica) DB 배포 및 기동"
  import_playbook: lb-postgres-replica.yml
