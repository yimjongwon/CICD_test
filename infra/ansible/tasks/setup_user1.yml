---
- name: "0.1단계: user1 계정 생성"
  ansible.builtin.user:
    name: user1
    shell: /bin/bash
    state: present
    groups: wheel
    append: true

- name: "0.2단계: user1에 NOPASSWD 권한 설정"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/user1"
    content: "user1  ALL=(ALL)  NOPASSWD: ALL"
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: "0.3단계: 제어 노드의 공개키를 user1의 authorized_keys에 주입"
  ansible.builtin.authorized_key:
    user: user1
    state: present
    key: "{{ user1_pub_key }}"
