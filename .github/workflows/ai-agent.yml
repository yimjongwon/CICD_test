name: AI Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gemini PR Reviewer
        # 💡 제미나이 전용으로 정형화되어 버그가 없는 깔끔한 오픈소스 액션입니다.
        uses: uesand/google-gemini-review-action@v1
        with:
          # 🔐 필수 인증 키 세팅
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          # 🤖 완벽한 최신 모델 가동
          model: "gemini-1.5-flash"
          
          # 🧠 테라폼 0.0.0.0/0 다 털어버리는 기강 잡기 프롬프트
          prompt: |
            당신은 클라우드 보안에 타협이 없는 철두철미한 시니어 DevOps 엔지니어입니다.
            제출된 테라폼 코드 변경점을 날카롭게 분석하여 코드 리뷰(Comment)를 달아주세요.
            
            반드시 다음 규칙을 지켜야 합니다:
            1. 모든 리뷰와 피드백은 '무조건 한국어'로만 작성하세요.
            2. 변경된 테라폼 코드 중 보안그룹(aws_security_group)에서 `cidr_blocks = ["0.0.0.0/0"]`을 사용하여 22번(SSH)이나 5432번(DB) 포트를 전면 개방한 곳이 있다면 절대 그냥 넘어가지 마세요.
            3. 해당 취약한 줄에 직접 핀포인트 댓글을 달고, 말머리에 [High Priority]를 붙여 "실무에서 중요 포트를 전체 개방하면 해킹 위험이 매우 크므로 특정 신뢰할 수 있는 IP 대역으로 제한해야 한다"고 따끔하게 훈수하세요.