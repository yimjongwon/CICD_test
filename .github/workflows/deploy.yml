# cicd_test/.github/workflows/deploy.yml


name: "Terraform Apply(수동)"
on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  deploy:
    runs-on: ubuntu-latest # 최신 ubuntu machine 을 잠시 빌려서 아래의 작업을 수행하겠다는 의미
    environment: ${{ github.actor }}
    permissions:
      contents: read
      issues: write
    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v5
     
      # 2. terraform 환경 구성
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
     
      # 3. terraform Init & Apply
      - name: Terraform Init and Apply
        working-directory: ./infra/terraform # 폴더 지정
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}
          TF_VAR_admin_ingress_cidr: ${{ secrets.IP }}
          TF_VAR_tailnet_name: ${{ secrets.TAILNET }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CF_TOKEN }}
          TF_VAR_domain_name: ${{ format('lockbank.{0}', secrets.DOMAIN) }}
          TF_VAR_route53_zone_name: ${{ secrets.DOMAIN }}
          TF_VAR_db_host_replica: ${{ secrets.REPLICA_IP }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_app_image: ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:latest      
        run: |
          # 🚀 [안전장치] GitHub Environment에 백엔드 설정(MY_BUCKET)이 없으면 즉시 차단
          if [ -z "${{ secrets.MY_BUCKET }}" ]; then
            echo "❌ 해당 개발자(${{ github.actor }})의 S3 Backend(MY_BUCKET) 설정이 GitHub Environment에 등록되어 있지 않아 배포를 중단합니다."
            exit 1
          fi

          # 테라폼 초기화 (현재 로그인한 팀원의 버킷과 테이블 주입)
          terraform init \
            -backend-config="bucket=${{ secrets.MY_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.MY_TABLE }}" \
            -backend-config="region=ap-northeast-2"

          # 인프라 배포 및 Blue/Green ASG 가동
          echo "수동 배포(apply)를 시작합니다."
          terraform apply --auto-approve

          # [핵심 변환 로직] 도메인이 정상 출력되었는지 판단 후 OWASP ZAP용 타겟 URL 생성
          SVC_DOMAIN=$(terraform output -raw service_domain)
          
          if [ "$SVC_DOMAIN" = "N/A (HTTP only)" ] || [ -z "$SVC_DOMAIN" ]; then
            # HTTPS 도메인이 설정되지 않았다면 ALB의 순수 DNS 주소(HTTP)를 타겟으로 삼음
            ALB_DNS=$(terraform output -raw alb_dns_name)
            CURRENT_APP_URL="http://${ALB_DNS}"
          else
            # 도메인이 정상 작동 중이라면 해당 도메인 주소(HTTPS)를 타겟으로 삼음
            CURRENT_APP_URL="https://${SVC_DOMAIN}"
          fi

          # 1) 다음 스텝(OWASP ZAP)을 위해 파일에 환경변수 저장
          echo "APP_URL=${CURRENT_APP_URL}" >> $GITHUB_ENV

          # 제대로 담겼는지 깃허브 액션 콘솔에서 확인하기 위한 한 줄
          echo "🎯 타겟 APP_URL이 설정되었습니다: ${CURRENT_APP_URL}"

      # ==========================================
      # 🎯 [보안 최종단계] DAST: OWASP ZAP (동적 모의 해킹)
      # ==========================================
      # 앤서블이 서버를 무사히 가동했으므로, 살아있는 URL을 향해 공격을 찌릅니다.
      - name: Run OWASP ZAP Baseline Scan
      # 깃허브 API 변경점이 반영된 최신 안정 버전으로 교체합니다.
        uses: zaproxy/action-baseline@v0.14.0
        with:
          # AWS 로드밸런서(ALB) DNS 주소나 연동된 도메인 주소
          target: ${{ env.APP_URL }}
          
          # 만약 특정 취약점이 나왔을 때 파이프라인을 실패(레드카드)로 만들고 싶다면 true로 둡니다.
          # 처음 테스트할 때는 어떤 결과가 나오는지 보기 위해 false로 두고 관측해도 좋습니다.
          fail_action: false