name: "Terraform Plan & Docker 빌드"
on:
  push: # 자동 push
    branches: ["main", "dev"]

jobs:
  deploy-plan:
    runs-on: ubuntu-latest # 최신 ubuntu machine 을 잠시 빌려서 아래의 작업을 수행하겠다는 의미
    environment: ${{ github.actor }}
    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v5
      
      # 관련 애플리케이션 및 빌드 파일 변경 사항 정밀 감지
      - name: Check for Application and Docker changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker_updated:
              - 'docker/app/Dockerfile'       # 도커 빌드 메커니즘 변경 시
              - 'docker/docker-compose.yaml'         # 컨테이너 구성 변경 시
              - 'docker/app/requirements.txt' # 파이썬 패키지 의존성 변경 시
              - 'docker/app/**'               # app 폴더 하위의 모든 파일(main.py, html, etc...) 감지
              - '!docker/app/**/*.md'         # ❌ 앱 폴더 내 설명서(.md) 변경은 무시!
              - '!docker/app/**/README*'      # ❌ README 파일 변경도 무시!

      # 2. terraform 환경 구성
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
     
      # 3. init & plan 실행 (배포 X, 안전한 테스트 단계)
      - name: Terraform Init and Plan
        working-directory: ./infra/terraform
        env:
          # 각 Environment(팀원별 환경)에 저장된 공통 이름의 Secret을 주입합니다.
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}
          TF_VAR_admin_ingress_cidr: ${{ secrets.IP }}
          TF_VAR_tailnet_name: ${{ secrets.TAILNET }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CF_TOKEN }}
          TF_VAR_domain_name: ${{ format('lockbank.{0}', secrets.DOMAIN) }}
          TF_VAR_route53_zone_name: ${{ secrets.DOMAIN }}
          TF_VAR_app_image: ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:latest  
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          # 🚀 [안전장치] GitHub 해당 Environment에 백엔드 설정이 비어있다면 중단합니다.
          if [ -z "${{ secrets.MY_BUCKET }}" ]; then
            echo "❌ 해당 개발자(${{ github.actor }})의 S3 Backend(MY_BUCKET) 설정이 GitHub Environment에 등록되어 있지 않습니다."
            exit 1
          fi

          # 테라폼 초기화 및 플랜 
          terraform init \
            -backend-config="bucket=${{ secrets.MY_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.MY_TABLE }}" \
            -backend-config="region=ap-northeast-2"

          terraform plan

      # 4. 도커 허브 로그인 (변화가 있을 때만)
      - name: Login to Docker Hub
        # 변화가있을때만 로그인하겠다
        if: steps.changes.outputs.docker_updated == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==========================================
      # [보안 1단계] SAST: Bandit (Python 코드 검사)
      # ==========================================
      - name: Run Bandit (SAST)
        if: steps.changes.outputs.docker_updated == 'true'
        working-directory: ./docker
        run: |
          pip install bandit
          bandit -r ./app -l

      # ==========================================
      # 5. 도커 이미지 빌드 (변화가 있을 때만)
      # ==========================================
      - name: Build Docker Image
        if: steps.changes.outputs.docker_updated == 'true'
        working-directory: ./docker/app
        run: |
          # 내 도커허브 계정명/이미지명:태그 형태로 빌드합니다.
          docker build \
          --build-arg GITHUB_ACTOR="${{ github.actor }}" \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:${{ github.run_number }} .

          # 방금 만든 숫자가 붙은 이미지를 기반으로 'latest' 이름표 하나 더 붙여주기
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:${{ github.run_number }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:latest

      # ==========================================
      # [보안 2단계] Container Scan: Trivy (이미지 검사)
      # ==========================================
      # 이미지 내부의 OS 및 패키지 취약점을 검사합니다.
      - name: Run Trivy vulnerability scanner
        if: steps.changes.outputs.docker_updated == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/lock-app:${{ github.run_number }}'
          format: 'table'
          exit-code: '1' # CRITICAL, HIGH 취약점 발견 시 빌드를 실패 처리하고 배포 차단
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # ==========================================
      # 6. 모든 보안 검증이 완벽히 완료된 후에만 이미지 최종 푸시
      # ==========================================
      - name: Push Docker Image
        if: steps.changes.outputs.docker_updated == 'true'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lock-app:latest

