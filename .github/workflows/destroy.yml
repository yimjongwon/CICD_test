# ~/cicd_test/.github/workflows/destroy.yml


name: "Terraform Destroy"
on:
  workflow_dispatch: # destory 수동 실행 버튼
jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.actor }}
    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v5

      # 2. 테라폼 환경 구성
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      # 3. 개별 백엔드 및 AWS 계정 분기 후 Destroy 실행
      - name: Terraform Init & Destroy
        working-directory: ./infra/terraform # 폴더 지정
        env:
          # 공통 이름으로 정리된 환경 시크릿을 깔끔하게 주입합니다.
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_KEY }}
          TF_VAR_admin_ingress_cidr: ${{ secrets.IP }}
          TF_VAR_tailnet_name: ${{ secrets.TAILNET }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CF_TOKEN }}
          TF_VAR_domain_name: ${{ format('lockbank.{0}', secrets.DOMAIN) }}
          TF_VAR_route53_zone_name: ${{ secrets.DOMAIN }}
        run: |
          # 🚀 [안전장치] GitHub Environment에 백엔드 설정(MY_BUCKET)이 없으면 즉시 차단
          if [ -z "${{ secrets.MY_BUCKET }}" ]; then
            echo "❌ 해당 개발자(${{ github.actor }})의 S3 Backend(MY_BUCKET) 설정이 GitHub Environment에 등록되어 있지 않아 인프라 삭제를 중단합니다."
            exit 1
          fi

          # hcl 파일에서 주입
          terraform init \
            -backend-config="bucket=${{ secrets.MY_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.MY_TABLE }}" \
            -backend-config="region=ap-northeast-2"

          # 본인 AWS 계정의 인프라만 안전하게 삭제
          terraform destroy --auto-approve