# security/nginx/nginx.conf
# Nginx 메인 설정 파일

# 역할 :
# - ALB에서 전달된 HTTP 요청 수신
# - 요청 경로별 Rate Limit 적용
# - Access Log 생성
# - FastAPI Container로 Reverse Proxy

# HTTPS는 Nginx가 아닌 ALB+ACM에서 처리하므로
# Nginx는 내부 HTTP 80 포트만 수신함.

events {}

http {
    include /etc/nginx/conf.d/log-format.conf;
    include /etc/nginx/conf.d/rate-limit.conf;

    access_log /var/log/nginx/access.log security_json;
    error_log  /var/log/nginx/error.log warn;

    set_real_ip_from 172.31.0.0/16; # 본인의 AWS VPC 대역 입력 (ALB가 위치한 IP 대역)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 80;

        # Security Headers
        # 클릭 재킹, MIME 스니핑, URL 정보 유출, XSS 공격 방지 및 완화
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # -------------------------------------------------------------
        # [Health Check]
        # Rate Limit 적용 x, ALB Target Group Health Check 용도
        # 배포 시 정상 서버 판단 기준 --> FastAPI /health 응답이 200이면 정상
        # -------------------------------------------------------------
        location /health {
            proxy_pass http://fastapi:8080/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # -------------------------------------------------------------
        # Login API
        # login_limit 적용 (rate-limit.conf 기준)
        # 초과 요청은 429 Too Many Requests 반환
        # 401 로그인 실패 로그는 fail2ban 탐지에 활용
        # -------------------------------------------------------------
        location /login {
            limit_req zone=login_limit burst=5 nodelay;

            proxy_pass http://fastapi:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # -------------------------------------------------------------
        # Transfer API
        # 금융 서비스 민감 기능인 이체 요청 보호
        # transfer_limit 적용, 로그인/일반 API보다 더 엄격하게 제한
        # 반복 이체 요청 혹은 자동화 남용 방지
        # 초과 요청은 429 Too Many Requests 반환
        # -------------------------------------------------------------
        location /transfer {
            limit_req zone=transfer_limit burst=3 nodelay;

            proxy_pass http://fastapi:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # -------------------------------------------------------------
        # 일반 API
        # 계좌 조회, 거래 내역 등 일반 API 요청 보호
        # api_limit 적용 및 API Flooding 공격 완화
        # 초과 요청은 429 Too Many Requests 반환
        # -------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastapi:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # -------------------------------------------------------------
        # Default Route
        # 정적 페이지 또는 기타 요청 --> FastAPI로 전달
        # 별도의 Rate Limit은 적용하지 않음
        # 필요 시 기본 요청 제한 정책 추가 가능.
        # -------------------------------------------------------------
        location / {
            proxy_pass http://fastapi:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location /stub_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}